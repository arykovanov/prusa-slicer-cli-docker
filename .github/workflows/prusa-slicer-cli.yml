name: Build prusa-slicer-cli
on:
  workflow_dispatch:

  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    environment: secrets
    name: Build
    runs-on: prusa-slicer-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.DOCKER_REGISTRY_HOST }}
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Build and push prusa-slicer-cli
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            BASE_IMAGE=hub.rykovanov.com/dockerhub/ubuntu:24.04

          tags: |
            ${{ vars.DOCKER_REGISTRY_HOST }}/images/prusa-slicer-cli:latest

      - name: prusa-slicer-cli docker image summary
        run: |
          echo "### prusa-slicer-cli Docker Image" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${DOCKER_REGISTRY_HOST}/images/prusa-slicer-cli:latest\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull with:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`docker pull ${DOCKER_REGISTRY_HOST}/images/prusa-slicer-cli:latest\`" >> "$GITHUB_STEP_SUMMARY"
        env:
          DOCKER_REGISTRY_HOST: ${{ vars.DOCKER_REGISTRY_HOST }}
